name: Keep Streamlit Awake

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Acessar painel da Gincana Garatuja
        run: |
          curl -L --max-time 60 --retry 3 --retry-delay 10 "https://gincana-garatuja.streamlit.app/" || true